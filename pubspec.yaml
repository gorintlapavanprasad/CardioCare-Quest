name: cardio_care_quest
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  device_info_plus: ^12.4.0
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  google_fonts: ^8.0.2
  flutter_svg: ^2.2.4
  provider: ^6.1.5+1
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.0.0
  signature: ^6.3.0
  geolocator: ^11.0.0
  shared_preferences: ^2.5.5
  webview_flutter: ^4.13.1
  web: ^1.1.1
  geoflutterfire_plus: ^0.0.34
  latlong2: ^0.9.1
  mobile_scanner: ^7.2.0
  flutter_compass: ^0.8.0
  get_it: ^9.2.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  uuid: ^4.5.3
  connectivity_plus: ^7.1.1
  fl_chart: ^0.68.0
  image_picker: ^1.0.8
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  rename: ^3.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/ccq.png
    - assets/branding/icon.png
    - assets/branding/app_icon.png
    - assets/game/dog_quest.html
    - assets/game/dog_quest/dog.png
    - assets/game/dog_quest/
    - assets/game/fonts/
    - assets/game/ccq_bridge.js

flutter_icons:
  android: true
  ios: true
  image_path: "assets/branding/launcher.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/branding/launcher.png"

flutter_native_splash:
  # ─── CHANGE THIS COLOR ───
  color: "#ffffff" # Replace with your preferred Hex code (e.g., a green to match the logo)
  
  # Your logo in the center
  image: "assets/branding/loader.png" 
  
  # Ensure Android 12+ (which uses a different splash API) also gets the color
  android_12:
   color: "#ffffff" # Same color as above for consistency
   image: "assets/branding/loader.png"
