<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bingo Bash</title>
  <script src="ccq_bridge.js"></script>
  <script src="ccq_twee.js"></script>
  <style>
    @font-face {
      font-family: 'Nunito';
      font-style: normal;
      font-weight: 600;
      src: url('fonts/Nunito-SemiBold.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Nunito';
      font-style: normal;
      font-weight: 700;
      src: url('fonts/Nunito-Bold.ttf') format('truetype');
    }
    :root {
      --bg: #f4f5f7;
      --card: #ffffff;
      --border: #d8dadf;
      --text: #2d3140;
      --muted: #6b7280;
      --accent: #c97c1f;
      --accent-light: #fbe9d4;
    }
    body, html {
      margin: 0;
      padding: 0;
      font-family: 'Nunito', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }
    .app {
      max-width: 540px;
      margin: 0 auto;
      padding: 20px 22px 100px;
      box-sizing: border-box;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0 18px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 18px;
    }
    .topbar h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0;
      color: var(--accent);
    }
    .home-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 6px 12px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .passage {
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .passage p,
    .passage > span {
      font-size: 17px;
      line-height: 1.55;
      color: var(--text);
      margin: 0 0 14px;
      display: block;
    }
    .passage strong { color: var(--accent); font-weight: 800; }
    button.twee-link {
      display: block;
      width: 100%;
      text-align: left;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin: 0 0 12px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button.twee-link:hover, button.twee-link:active {
      background: var(--accent-light);
      border-color: var(--accent);
    }
    .twee-textbox {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      margin: 0 0 12px;
    }
    .twee-textbox:focus { outline: none; border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>Bingo Bash</h1>
      <button type="button" class="home-btn" onclick="CCQ.goHome()">Back home</button>
    </div>
    <div id="twee-root"></div>
  </div>

  <!-- Twee source embedded as text. type="text/twee" is non-executable. -->
  <script type="text/twee" id="twee-source">
::StoryTitle
Bingo Bash

::StoryData
{
  "ifid": "E5F6A7B8-C9D0-1234-EFAB-345678901234",

  "format-version": "2.37.3",
  "start": "Story innit",
  "zoom": 0.6
}

::UserStylesheet [stylesheet]
body { font-family: "Times New Roman", Times, serif; }
#ui-bar { display: none; }

::UserScript [script]


::Story innit [Important/Needed]
/*
SYSTEM CODE: runs once at the very start.

Variables:
- $playerName   : pulled from sign-in
- $marked       : list of activities the player has marked complete today
- $score        : how many cells marked today
- $streak       : days in a row the player has played
- $wonToday     : whether the player has got five in a row today
- $customGoal   : a personal goal the player adds to their board

You do not need to edit this.
*/

<<set $playerName to "Friend">>
<<set $marked to []>>
<<set $score to 0>>
<<set $streak to 0>>
<<set $wonToday to false>>
<<set $customGoal to "">>

<<goto "Welcome">>


::Welcome [Important/Needed]
/*
INCITING MOMENT: Personal greeting. Simple hook. One button.
*/

Hey $playerName. Welcome to Bingo Bash.

You know how bingo works. A grid. Items called. Mark them off. Five in a row and you win.

Bingo Bash works the same way. Except the grid is not numbers. It is your health goals for the day.

[[What is on the board?|What Is On The Board]]


::What Is On The Board [Important/Needed]
/*
RISING ACTION: What the board contains. Real activities. Daily refresh.
*/

Every morning your board refreshes. Twenty-five cells. Each one contains a blood-pressure-friendly activity.

Reduce sodium today. Take a walk. Drink eight glasses of water. Take your medication. Call a family member. Meditate for ten minutes. Cook a DASH-friendly meal.

Real activities. Things you can actually do before the end of the day.

[[How do I win?|How You Win]]


::How You Win [Important/Needed]
/*
RISING ACTION: Five in a row. Any direction.
*/

Mark five in a row and you win the day.

Horizontal. Vertical. Diagonal. Any five connected cells you completed.

The board is designed so that five in a row is achievable. Not easy. Achievable. The activities are chosen to complement each other, so completing one often makes the next one easier.

[[Is there anything else on the board?|The Community]]


::The Community [Important/Needed]
/*
RISING ACTION: Community button. You are not playing alone.
*/

You are not playing alone.

The community button connects you with other players working on their boards. You can see what activities others are marking off, get ideas for ones you have not tried, and move alongside people working toward the same goal.

[[What if I do not know how to start an activity?|The Inspiration Button]]


::The Inspiration Button [Important/Needed]
/*
RISING ACTION: Inspiration button. Practical help for stuck cells.
*/

Some cells will stop you. An activity you have never tried. One that sounds right but you are not sure how to start.

The inspiration button is there for exactly that. Tap it next to any cell and you get a short practical idea for how to approach that goal today. Not a lecture. Just a starting point.

[[Can I add my own goals?|Your Personal Goals]]


::Your Personal Goals [Important/Needed]
/*
TURNING POINT: Personal goals. The board is yours.
*/

Yes.

The edit page lets you add your own activities to the board. If your doctor gave you a specific target, if your family has a tradition that supports your health, if there is something you know works for you that is not on the default board, you can put it there.

The board reflects your health. Not a generic template.

[[I want to add a personal goal now.|Add Personal Goal]]

[[Skip this and go to my board.|Board Start]]


::Add Personal Goal [Important/Needed]
/*
OPTIONAL: Player adds a personal health goal to their board.
Stored in $customGoal. Carried into the board.
*/

What is one health goal you want to work on today?

It can be anything. A specific food to avoid. A habit to build. Something your doctor mentioned. Something you just want to try.

<<textbox "$customGoal" "" autofocus>>

<<link "Add this to my board.">>
<<set $customGoal to $customGoal.trim()>>
<<if $customGoal is "">>
<<goto "Add Personal Goal">>
<<else>>
<<goto "Goal Confirmed">>
<</if>>
<</link>>


::Goal Confirmed [Important/Needed]
/*
CONFIRMATION: Personal goal added. Move to board.
*/

Added to your board: ''$customGoal''

It will appear among your activities for today. Mark it off when you complete it.

[[Go to my board.|Board Start]]

[[Check my progress.|Check Progress]]

[[I need inspiration on an activity.|Inspiration]]


::Check Progress [Important/Needed]
/*
PROGRESS CHECK: Shows how many cells marked.
Checks if player has reached five for a win.
*/

Cells marked today: $score out of 25.

<<if $score gte 5>>
''You have marked five or more cells today.''

Check your board. If five of them form a line, horizontal, vertical, or diagonal, you have won today's board.

[[Claim my win.|Daily Win]]
<<else>>

::Daily Win [Important/Needed]
/*
CLIMAX: Player has won the day's board. Celebration and streak update.
*/

Bingo.

Five in a row. Today's board is complete.

<<set $wonToday to true>>
<<set $streak to $streak + 1>>

Streak: $streak days in a row.

Every cell you marked today was a real action. Reduced sodium. Movement. Rest. Connection. These are not game points. They are the actual behaviors that lower blood pressure over time.

::Inspiration [Important/Needed]
/*
INSPIRATION: Player picks which activity they need help with.
Short practical tip for each one.
*/

Which activity do you need a starting point for?

<<link "Reduce sodium at a meal.">><<goto "Inspire Sodium">><</link>>

<<link "Meditate or sit quietly.">><<goto "Inspire Meditate">><</link>>

<<link "Eat a DASH-friendly meal.">><<goto "Inspire DASH">><</link>>

<<link "Check my blood pressure.">><<goto "Inspire BP">><</link>>

<<link "Take a walk.">><<goto "Inspire Walk">><</link>>

[[Back to my board.|Board Start]]


::Inspire Sodium [Important/Needed]
/*
INSPIRATION: Sodium reduction tip.
*/

Reducing sodium at one meal does not mean cooking something different.

It means checking what you already planned to eat and making one swap. Use herbs instead of salt to season. Choose a low-sodium version of something you already buy. Skip adding salt at the table.

One meal. One swap. That is enough to count.

[[Back to my board.|Board Start]]


::Inspire Meditate [Important/Needed]
/*
INSPIRATION: Meditation tip.
*/

You do not need an app or a special technique.

Sit in a chair. Close your eyes if that is comfortable. Breathe in slowly for four counts. Hold for two. Breathe out for six. Do that ten times.

That is ten minutes. It is enough to lower your heart rate and reduce the stress hormones that raise blood pressure.

[[Back to my board.|Board Start]]


::Inspire DASH [Important/Needed]
/*
INSPIRATION: DASH meal tip.
*/

A DASH-friendly meal does not have to be complicated.

Beans and brown rice. A salad with spinach, tomato, and a banana on the side. Yogurt with berries. Sweet potato with no added salt.

Pick one of those. Cook it the way you normally would. That is a DASH meal.

[[Back to my board.|Board Start]]


::Inspire BP [Important/Needed]
/*
INSPIRATION: Blood pressure check tip.
*/

If you have a blood pressure cuff at home, sit quietly for five minutes first. Feet flat on the floor. Back supported. Then take the reading.

If you do not have a cuff, many pharmacies have a free machine available. Some clinics offer walk-in readings.

The goal is just to know the number. You cannot manage what you cannot measure.

[[Back to my board.|Board Start]]


::Inspire Walk [Important/Needed]
/*
INSPIRATION: Walking tip. No assumptions about ability or pace.
*/

A walk does not have a minimum distance or speed.

It means leaving where you are and moving your body through space for any amount of time. Around the block. Down the hall. To the end of the driveway and back.

The activity on the board is marked when you go. Not when you reach a specific distance.

[[Back to my board.|Board Start]]


::Final Result [Important/Needed]
/*
END OF SESSION: Shows today's summary.
Encourages return tomorrow.
*/

Here is today's summary, $playerName.

Cells marked: $score out of 25.
Streak: $streak days.

<<if $wonToday is true>>You completed a full row today. Every activity you marked was a real step toward better blood pressure management.
<<elseif $score gte 3>>Good progress. Three or more activities completed is a meaningful day. Come back tomorrow and the board resets.
<<else>>A start is a start. Any activity you marked today made a difference. Come back tomorrow.
<</if>>

[[Back to CardioCareQuest.|Central Hub]]


::Central Hub [Important/Needed]
/*

  </script>

  <script>
    // Boot the runtime once the DOM is ready. The "Central Hub" passage is
    // the canonical exit hatch in our authored stories; intercept it and
    // route back to the Flutter app instead of rendering it.
    document.addEventListener('DOMContentLoaded', function () {
      try {
        CCQTwee.runFromScript('twee-source', 'Story innit', {
          onCentralHub: function () {
            try { CCQ.goHome(); } catch (e) { console.error(e); }
          }
        });
      } catch (e) {
        console.error('CCQTwee boot failed:', e);
        document.getElementById('twee-root').textContent =
          'This game could not load. Please go back and try again.';
      }
    });
  </script>
